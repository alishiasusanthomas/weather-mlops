name: Daily ML Pipeline

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - run: pip install -r requirements.txt
      - run: pip install dvc

      - run: dvc repro
      - run: dvc push